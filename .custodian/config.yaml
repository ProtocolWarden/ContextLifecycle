repo_key: ContextLifecycle
src_root: src/context_lifecycle
tests_root: tests

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# Names declared private by the boundary artifact cause B1 to fail any tracked
# file that mentions them. Default excludes (.console/**, .custodian/config.yaml)
# spare operator-private surfaces.
privacy:
  require_boundary_artifact: true

# ---------------------------------------------------------------------------
# Audit: per-detector exclusions
# ---------------------------------------------------------------------------
audit:
  # session/anchor + cli/session read CL_ANCHOR / CL_SESSION_ID / SHELL from the
  # environment in the CLI layer; this *is* the config/entry layer for those vars.
  # context_engine/prune.py reads CL_SESSION_ID standalone — it ships verbatim
  # into a consumer's .context/.engine/ where there is no CL config layer (below).
  c13_allowed_paths:
    - "src/context_lifecycle/cli/session.py"
    - "src/context_lifecycle/session/anchor.py"
    - "src/context_lifecycle/session/ids.py"
    - "src/context_lifecycle/context_engine/prune.py"
    # reconcile/{privacy,scrub} resolve the private-manifest dir + boundary
    # artifact via env ($PRIVATE_MANIFEST_DIR / $REPOGRAPH_BOUNDARY_ARTIFACT_FILE)
    # by design — env IS the discovery layer here (spec forbids a hardcoded
    # private-manifest literal in source). This is the config/entry layer.
    - "src/context_lifecycle/reconcile/privacy.py"
    - "src/context_lifecycle/reconcile/scrub.py"

  exclude_paths:
    # ----------------------------------------------------------------------
    # context_engine/*: VENDORED engine source. These six modules ship
    # BYTE-IDENTICAL into each consumer repo's .context/.engine/ via
    # `cl context init` (test_context_engine_scaffold asserts the byte-match);
    # the hooks run them by file path (python3 .context/.engine/route.py), not as
    # CL's importable API, and tests exercise them via importlib path-load. So the
    # src-quality detectors (parallel-test layout, encoding=, line count, the
    # intentional per-module dual-mode import-shim clones, documented design TODOs)
    # don't apply as they would to CL's own library code. __init__.py / scaffold.py
    # ARE CL's own API and stay under the normal rules.
    engine_vendored: &engine_vendored
      - src/context_lifecycle/context_engine/route.py
      - src/context_lifecycle/context_engine/cold.py
      - src/context_lifecycle/context_engine/consolidate.py
      - src/context_lifecycle/context_engine/distill.py
      - src/context_lifecycle/context_engine/campaign.py
      - src/context_lifecycle/context_engine/prune.py
    C1: *engine_vendored
    C16: *engine_vendored
    C29: *engine_vendored
    U5: *engine_vendored
    D11: *engine_vendored
    # errors.py is a pure typed-exception hierarchy (no logic to unit test).
    # cli/main.py + cli/context.py are thin Typer wiring: commands are invoked by
    # CLI string (so T1 can't see them by symbol), and exercised via CliRunner
    # tests; the real logic (_load_json) is unit-tested directly. The vendored
    # engine modules are loaded by path (not by-name import), so T1/T6/T7 (which
    # key on by-name imports + parallel test files) don't apply.
    # reconcile/*: the cl reconcile package is exercised by tests/test_reconcile_*.py
    # (29 tests on temp fixtures: worksheet/scrub/check/prune/index/cli). CL's test
    # convention is flat tests/test_<topic>.py, not the mirrored tests/unit/<pkg>/
    # layout T7 prints as its expected path; the package modules are imported through
    # the topic test files + the CLI, not by per-module name. cli/reconcile.py is a
    # thin Typer shim (invoked by CLI string), like cli/main.py + cli/context.py.
    T1: &cli_shims
      - src/context_lifecycle/errors.py
      - src/context_lifecycle/cli/main.py
      - src/context_lifecycle/cli/context.py
      - src/context_lifecycle/context_engine/route.py
      - src/context_lifecycle/context_engine/cold.py
      - src/context_lifecycle/context_engine/consolidate.py
      - src/context_lifecycle/context_engine/distill.py
      - src/context_lifecycle/context_engine/campaign.py
      - src/context_lifecycle/context_engine/prune.py
      - src/context_lifecycle/reconcile/check.py
      - src/context_lifecycle/reconcile/prune.py
      - src/context_lifecycle/reconcile/index.py
      - src/context_lifecycle/reconcile/worksheet.py
      - src/context_lifecycle/reconcile/scrub.py
      - src/context_lifecycle/reconcile/privacy.py
      - src/context_lifecycle/reconcile/mdsections.py
      - src/context_lifecycle/cli/reconcile.py
    T6: *cli_shims
    T7: *cli_shims
